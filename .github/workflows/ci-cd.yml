name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/test-results.trx'

    - name: Test Summary
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "? Unit tests completed" >> $GITHUB_STEP_SUMMARY

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build WarehouseService Docker image
      run: docker build -t warehouse-service:${{ github.sha }} -f WarehouseService/Dockerfile .

    - name: Build SearchService Docker image
      run: docker build -t search-service:${{ github.sha }} -f SearchService/Dockerfile .

    - name: Build AddBookService Docker image
      run: docker build -t addbook-service:${{ github.sha }} -f AddBookService/Dockerfile .

    - name: Build OrderService Docker image
      run: docker build -t order-service:${{ github.sha }} -f OrderService/Dockerfile .

    - name: Docker Build Summary
      run: |
        echo "## Docker Build Results" >> $GITHUB_STEP_SUMMARY
        echo "? All microservices built successfully" >> $GITHUB_STEP_SUMMARY
        echo "- warehouse-service:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- search-service:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- addbook-service:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- order-service:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
