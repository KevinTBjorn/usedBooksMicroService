global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'addbookservice'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['addbookservice:8080']
  
  - job_name: 'orderservice'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['orderservice:8080']

rule_files:
  - '/etc/prometheus/alert_rules.yml'